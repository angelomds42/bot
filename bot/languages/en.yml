# English strings
common:
  start: |
    hey\. I'm [Fujino](https://raw.githubusercontent.com/angelomds42/AyumuFujinoBot/refs/heads/main/bot/assets/banner.png)\, a group management bot with notes, filters and a few other extras\.

    hit *Help* to see what I can do\.
  start_group: "hey, I'm here\\."
  help: 'select a module below to see its commands\.'
  help_pm: "I don't show menus in groups\\. tap the button to open this in PM\\."
  back: "« back"
  btn_help: "help »"

basics:
  help: |
    *basics:*\:
    /start \- start me up
    /help \- show this menu

github:
  help: |
    *github*:\:
    /github `<username>` \- look up a github user
  no_args: 'usage\: `/github <username>`'
  not_found: "don't know them\\."
  error: "github isn't talking to me right now\\. try again later\\."
  user_info: "profile"
  name: "name"
  username: "username"
  location: "location"
  public_repos: "repos"
  followers: "followers"

errors:
  unknown: 'something went wrong\.'
  not_found: 'not found\.'

moderation:
  common:
    user_not_admin: 'admins only\.'
    bot_no_permission: "i need the restrict members permission for that\\. check my admin rights\\."
    no_target: "who? reply to someone, mention them, or give me a user ID\\."
    reply_required: 'reply to a message to use this\.'
    restriction_reason: 'reason\: {reason}'
  ban:
    success: '`{username}` is banned\.'
    duration: 'until\: {duration}'
    error: "couldn't ban\\. check my permissions\\."
    self: "banning yourself won't solve your problems\\."
    admin: "they're an admin\\. i can't touch them\\."
    not_banned: "they're not banned\\."
    help: |
      *bans*\:
      the nuclear options\.

      /ban `<usr>` `[time]` `[reason]` \- ban a user
      /dban `<usr>` \- ban and delete their message
      /unban `<usr>` \- unban a user
      /kick `<usr>` `[reason]` \- kick a user

      `<usr>` — @mention, reply or user ID
      `[time]` — 1m, 2h, 3d
  unban:
    success: '`{username}` is unbanned\.'
    error: "couldn't unban\\. check my permissions\\."
    self: "you're not banned\\."
  kick:
    success: '`{username}` was kicked\.'
    error: "couldn't kick\\. check my permissions\\."
    self: "kicking yourself out? that's a new one\\."
    admin: "they're an admin\\. i can't touch them\\."
  mute:
    success: '`{username}` is muted\.'
    duration: 'until\: {duration}'
    error: "couldn't mute\\. check my permissions\\."
    self: "if you want to stop talking, just stop talking\\."
    admin: "they're an admin\\. i can't touch them\\."
    help: |
      *mutes*\:
      still here, just quiet\.

      /mute `<usr>` `[time]` `[reason]` \- mute a user
      /unmute `<usr>` \- unmute a user

      `<usr>` — @mention, reply or user ID
      `[time]` — 1m, 2h, 3d
  unmute:
    success: '`{username}` can talk again\.'
    error: "couldn't unmute\\. check my permissions\\."
    self: "you're not muted\\."
    not_muted: "they're not muted\\."
  warn:
    warned: '`{username}` warned\. `{count}/{limit}` — keep it up\.'
    banned: '`{username}` reached `{count}/{limit}` warns\. banned\.'
    none: '`{username}` has a clean record\.'
    no_reason: "no reason given"
    list: '`{username}` — `{count}/{limit}` warns\:'
    reset: 'warns cleared for `{username}`\.'
    limit_usage: 'usage\: /warnlimit `<number>`'
    limit_set: 'warn limit set to `{limit}`\.'
    self: "you can't warn yourself\\."
    admin: "they're an admin\\. i can't touch them\\."
    help: |
      *warns*\:
      three strikes and you're out\. or however many you set\.

      /warn `<usr>` `[reason]` \- warn a user
      /warns `<usr>` \- check a user's warns
      /resetwarn `<usr>` \- clear someone's warns
      /warnlimit `<num>` \- set the warn limit \(default\: 3\)

      `<usr>` — @mention, reply or user ID
      `<num>` — any number, min\. 1
  help: 'select a submodule\.'

settings:
  setlang_usage: 'usage\: /setlang `<lang>`\. available\: {langs}'
  setlang_success: 'alright, `{lang}` it is\.'
  help: |
    *settings*\:
    tweak how i behave in this group\.

    /setlang `<lang>` \- change the group language

    `<lang>` — e\.g\. `en`, `pt`

notes:
  save_usage: 'usage\: /save `<n>` `<content>`\, or reply to a message'
  save_success: 'saved `#{name}`\.'
  save_no_content: "there's nothing to save in that message\\."
  delnote_usage: 'usage\: /delnote `<n>`'
  delnote_success: 'deleted `#{name}`\.'
  delnote_not_found: "never heard of `#{name}`\\."
  get_usage: 'usage\: /get `<number>`'
  not_found_index: "nothing at position `{index}`\\."
  not_found: "never heard of `#{name}`\\."
  empty: 'no notes saved here yet\.'
  list_header: 'notes\:'
  help: |
    *notes*\:
    save things\. get them back later\.

    /save `<n>` `<text>` \- save a note
    /save `<n>` \(reply\) \- save a message or media as a note
    /notes \- list all notes
    /get `<num>` \- get a note by number
    /delnote `<n>` \- delete a note
    \#name \- get a note by name

    `<n>` — note name
    `<num>` — position in /notes list

misc:
  help: |
    *misc*\:
    /ping \- check my response time
    /dice \- roll a dice

filters:
  save_usage: 'usage\: /filter `<key>` `<msg>` or reply to a message\. for multi\-word keys use quotes\: /filter `"hey there"` `msg`'
  save_success: 'filter `{keyword}` saved\.'
  remove_usage: 'usage\: /unfilter `<key>`'
  remove_success: 'filter `{keyword}` removed\.'
  remove_all_success: 'all filters cleared\.'
  not_found: "there's no filter called `{keyword}`\\."
  no_content: "there's nothing to save in that message\\."
  empty: 'no filters set here yet\.'
  list_header: 'active filters\:'
  help: |
    *filters*\:
    i reply so you don't have to\.

    /filter `<key>` `<msg>` \- add a filter
    /filter `<key>` \(reply\) \- add a filter from a message
    /unfilter `<key>` \- remove a filter
    /stopall \- clear all filters
    /filters \- list active filters

    `<key>` — single word or "phrase in quotes"
