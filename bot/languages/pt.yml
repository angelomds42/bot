moderation:
  common:
    user_not_admin: 'só admins\.'
    bot_no_permission: 'preciso da permissão de restringir membros para isso\. verifique minhas permissões de admin\.'
    no_target: 'quem? responda a alguém\, mencione\, ou me forneça um ID\.'
    reply_required: 'responda a uma mensagem para usar isso\.'
    restriction_reason: 'motivo\: {reason}'
  ban:
    success: '`{username}` foi banido\.'
    duration: 'até\: {duration}'
    error: 'não consegui banir\. verifique minhas permissões\.'
    self: 'se banir não vai resolver seus problemas\.'
    admin: 'esse é admin\. não posso fazer nada\.'
    not_banned: 'ele nem está banido\.'
    help: |
      *bans*\:
      as opções nucleares\.

      /ban `<usr>` `[tempo]` `[motivo]` \- bane um usuário
      /dban `<usr>` \- bane e apaga a mensagem
      /unban `<usr>` \- desbane um usuário
      /kick `<usr>` `[motivo]` \- remove um usuário

      `<usr>` — @menção, reply ou user ID
      `[tempo]` — 1m, 2h, 3d
  unban:
    success: '`{username}` foi desbanido\.'
    error: 'não consegui desbanir\. verifique minhas permissões\.'
    self: 'você nem está banido\.'
  kick:
    success: '`{username}` foi removido\.'
    error: 'não consegui remover\. verifique minhas permissões\.'
    self: 'sair sozinho é sempre uma opção\.'
    admin: 'esse é admin\. não posso fazer nada\.'
  mute:
    success: '`{username}` foi silenciado\.'
    duration: 'até\: {duration}'
    error: 'não consegui silenciar\. verifique minhas permissões\.'
    self: 'se quiser parar de falar\, é só parar\.'
    admin: 'esse é admin\. não posso fazer nada\.'
    help: |
      *silêncio*\:
      ainda aqui, só quieto\.

      /mute `<usr>` `[tempo]` `[motivo]` \- silencia um usuário
      /dmute `<usr>` \- silencia um usuário e apaga a mensagem
      /unmute `<usr>` \- remove o silêncio

      `<usr>` — @menção, reply ou user ID
      `[tempo]` — 1m, 2h, 3d
  unmute:
    success: '`{username}` pode falar de novo\.'
    error: 'não consegui remover o silêncio\. verifique minhas permissões\.'
    self: 'você nem está silenciado\.'
    not_muted: 'ele nem está silenciado\.'
  warn:
    warned: '`{username}` advertido\. `{count}/{limit}` — continue assim\.'
    banned: '`{username}` atingiu `{count}/{limit}` advertências\. banido\.'
    none: '`{username}` tem a ficha limpa\.'
    no_reason: "sem motivo"
    list: '`{username}` — `{count}/{limit}` advertências\:'
    reset: 'advertências de `{username}` limpas\.'
    limit_usage: 'uso\: /warnlimit `<número>`'
    limit_set: 'limite de advertências definido para `{limit}`\.'
    self: 'você não pode se advertir\.'
    admin: 'esse é admin\. não posso fazer nada\.'
    help: |
      *advertências*\:
      três chances e acabou\. ou quantas você definir\.

      /warn `<usr>` `[motivo]` \- adverte um usuário
      /warns `<usr>` \- veja as advertências de alguém
      /resetwarn `<usr>` \- limpe as advertências de alguém
      /warnlimit `<num>` \- defina o limite \(padrão\: 3\)

      `<usr>` — @menção, reply ou user ID
      `<num>` — qualquer número, mín\. 1
  help: 'selecione um submódulo\.'

